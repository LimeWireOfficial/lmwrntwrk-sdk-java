name: Publish to Maven Central

on:
  push:
    branches:
      - main
      - chore/initial-setup
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure .m2 directory exists
        run: mkdir -p ~/.m2

      - name: Create empty settings-security.xml to prevent FileNotFoundException
        run: echo "<settingsSecurity><master>{NONE}</master></settingsSecurity>" > ~/.m2/settings-security.xml

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Extract version from tag
        id: extract_version
        #run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV  # Extracts '1.2.3' from 'v1.2.3'
        run: echo "RELEASE_VERSION=0.1.1-rc.2" >> $GITHUB_ENV  # Extracts '1.2.3' from 'v1.2.3'

      - name: Update POM version
        run: mvn versions:set -DnewVersion=${{ env.RELEASE_VERSION }} -DgenerateBackupPoms=false

      - name: Commit updated POM
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add pom.xml
          git commit -m "Update version to ${{ env.RELEASE_VERSION }}"
          git push

      - name: Build
        run: mvn -f pom.xml clean install --no-transfer-progress
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Publish Release
        #if: startsWith(github.ref, 'refs/tags/v')
        if: github.event_name == 'push'
        run: mvn clean deploy -Prelease -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
